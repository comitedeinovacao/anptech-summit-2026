<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<title>Palestras — TV Horizontal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--laranja:#F7941D;--azul:#004587;--azul2:#002d6b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:800px;height:600px;overflow:hidden;font-family:'Montserrat',sans-serif;background:var(--azul2);}

  .topbar{height:6px;background:var(--laranja);}
  .botbar{position:absolute;bottom:0;left:0;right:0;height:6px;background:var(--laranja);}

  .layout{display:flex;height:calc(600px - 12px);}

  /* SIDEBAR */
  .sidebar{width:160px;background:rgba(0,0,0,.25);border-right:1px solid rgba(255,255,255,.1);flex-shrink:0;display:flex;flex-direction:column;justify-content:space-between;padding:20px 16px;}
  .logo{height:24px;object-fit:contain;filter:brightness(0) invert(1);}
  .logo-fb{width:54px;height:24px;background:rgba(255,255,255,.15);border-radius:4px;display:flex;align-items:center;justify-content:center;gap:2px;}
  .logo-fb-t{font-size:12px;font-weight:900;color:#fff;}
  .logo-fb-sp{font-size:6px;font-weight:700;color:var(--laranja);align-self:flex-end;margin-bottom:1px;}
  .sidebar-label{font-size:8px;font-weight:800;color:var(--laranja);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .sidebar-title{font-size:20px;font-weight:900;color:#fff;line-height:1.15;margin-bottom:8px;}
  .sidebar-desc{font-size:11px;color:rgba(255,255,255,.55);line-height:1.6;}
  .count-box{background:var(--laranja);border-radius:8px;padding:8px 12px;display:inline-block;}
  .count-num{font-size:16px;font-weight:900;color:#fff;}
  .count-lbl{font-size:8px;font-weight:700;color:rgba(255,255,255,.8);}

  /* CONTEÚDO DIREITO */
  .right-col{flex:1;display:flex;flex-direction:column;}

  /* GRID */
  .main{flex:1;padding:12px 16px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,1fr);gap:8px;}

  /* QR STRIP */
  .qr-strip{background:rgba(255,255,255,.06);border-top:1px solid rgba(255,255,255,.12);padding:8px 14px;display:flex;align-items:center;gap:12px;}
  .qr-strip-img{width:44px;height:44px;background:#fff;border-radius:6px;padding:3px;flex-shrink:0;}
  .qr-strip-img img{width:38px;height:38px;display:block;}
  .qr-strip-label{font-size:7px;font-weight:800;color:var(--laranja);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
  .qr-strip-title{font-size:10px;font-weight:800;color:#fff;margin-bottom:1px;}
  .qr-strip-url{font-size:8px;color:rgba(255,255,255,.5);}

  .card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;}
  .card-day{min-width:28px;text-align:center;flex-shrink:0;}
  .card-day-num{font-size:14px;font-weight:900;color:var(--laranja);line-height:1;}
  .card-day-mes{font-size:7px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;}
  .card-day-hora{font-size:8px;font-weight:700;color:rgba(255,255,255,.55);margin-top:1px;}
  .card-info{flex:1;min-width:0;}
  .card-titulo{font-size:11px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .card-speaker{font-size:8px;font-weight:600;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .loading{display:flex;align-items:center;justify-content:center;grid-column:1/-1;grid-row:1/-1;color:rgba(255,255,255,.5);font-size:12px;}
  .spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--laranja);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar"></div>
<div class="layout">

  <div class="sidebar">
    <div>
      <img src="https://portal-bucket.azureedge.net/wp-content/sites/246/2024/01/senac-logo.png" alt="Senac" class="logo"
           onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex';">
      <div class="logo-fb" id="logo-fb" style="display:none;">
        <span class="logo-fb-t">SENAC</span><span class="logo-fb-sp">SP</span>
      </div>
    </div>
    <div>
      <div class="sidebar-label">Stand Senac Araçatuba</div>
      <div class="sidebar-title">Nossas<br>Palestras</div>
      <div class="sidebar-desc">15 e 16 de Maio de 2026<br>Entrada gratuita</div>
    </div>
    <div>
      <div class="count-box"><div class="count-num" id="count-num">—</div><div class="count-lbl">palestras</div></div>
    </div>
  </div>

  <div class="right-col">
    <div class="main" id="main">
      <div class="loading"><div><div class="spinner"></div>Carregando…</div></div>
    </div>
    <div class="qr-strip">
      <div class="qr-strip-img">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=38x38&color=004587&data=https%3A%2F%2Fcomitedeinovacao.github.io%2Fanptech-summit-2026%2Fcadastro.html" alt="QR Inscrição">
      </div>
      <div>
        <div class="qr-strip-label">Inscreva-se gratuitamente</div>
        <div class="qr-strip-title">Escaneie e garanta sua vaga</div>
        <div class="qr-strip-url">comitedeinovacao.github.io/anptech-summit-2026/cadastro.html</div>
      </div>
    </div>
  </div>

</div>
<div class="botbar"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:"AIzaSyBweUBoLxm6FuMp65aPUuExkuTVYp3rVKs",
  authDomain:"anptech-summit-2026.firebaseapp.com",
  projectId:"anptech-summit-2026",
  storageBucket:"anptech-summit-2026.firebasestorage.app",
  messagingSenderId:"454031276319",
  appId:"1:454031276319:web:2738fd5ca50c0a0fdc582a"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function render(palestras){
  const lista = palestras.filter(p => p.senac)
    .sort((a,b) => {
      if(a.dia !== b.dia) return (a.dia||0)-(b.dia||0);
      return (a.horario_inicio||'').localeCompare(b.horario_inicio||'');
    }).slice(0, 6); // máximo 6 no grid 2×3

  document.getElementById('count-num').textContent = palestras.filter(p => p.senac).length;

  if(!lista.length){
    document.getElementById('main').innerHTML = '<div class="loading" style="flex-direction:column;gap:12px;"><div style="font-size:32px;">🎤</div><div>Nenhuma palestra cadastrada</div></div>';
    return;
  }

  document.getElementById('main').innerHTML = lista.map(p => `
    <div class="card">
      <div class="card-day">
        <div class="card-day-num">${p.dia||'?'}</div>
        <div class="card-day-mes">maio</div>
        <div class="card-day-hora">${p.horario_inicio||'?'}</div>
      </div>
      <div class="card-info">
        <div class="card-titulo">${p.titulo||'—'}</div>
        ${p.palestrante?`<div class="card-speaker">👤 ${p.palestrante}</div>`:''}
      </div>
    </div>`).join('');
}

db.collection('palestras').onSnapshot(snap => {
  render(snap.docs.map(d => ({id:d.id,...d.data()})));
});
</script>
</body>
</html>
