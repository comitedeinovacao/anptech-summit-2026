<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<title>Palestras — Stand Senac · ANPTECH 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--laranja:#F7941D;--azul:#004587;--azul2:#002d6b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:800px;height:600px;overflow:hidden;font-family:"Montserrat",sans-serif;
    background:linear-gradient(135deg,#001020 0%,#002050 55%,var(--azul) 100%);color:#fff;}

  .slide{width:800px;height:600px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
  .orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
  .bar{position:relative;z-index:10;width:100%;height:8px;background:var(--laranja);flex-shrink:0;}
  .body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;overflow:hidden;}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
  .logo-side{display:flex;align-items:center;gap:14px;}
  .logo-img{height:30px;width:auto;object-fit:contain;}
  .logo-fb{display:none;align-items:center;}
  .logo-fb-txt{font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.5px;}
  .logo-fb-sp{background:var(--laranja);color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px;margin-left:5px;align-self:flex-start;margin-top:2px;}
  .header-info{text-align:right;}
  .header-label{font-size:10px;font-weight:800;color:var(--laranja);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px;}
  .header-title{font-size:22px;font-weight:900;color:#fff;line-height:1.1;}
  .live-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(247,148,29,0.18);border:1.5px solid rgba(247,148,29,0.50);border-radius:100px;padding:6px 16px;}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--laranja);animation:blink 1.2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  .live-txt{font-size:12px;font-weight:800;color:#FFB84D;letter-spacing:1px;text-transform:uppercase;}

  /* GRID */
  .grid{flex:1;display:grid;grid-template-columns:1fr 240px;overflow:hidden;}

  /* LISTA */
  .col-list{padding:12px 16px 12px 28px;overflow:hidden;display:flex;flex-direction:column;gap:7px;}
  .item{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:10px;padding:11px 14px;display:flex;gap:14px;align-items:flex-start;flex-shrink:0;}
  .item-day{min-width:52px;text-align:center;flex-shrink:0;}
  .item-day-num{font-size:22px;font-weight:900;color:var(--laranja);line-height:1;}
  .item-day-mes{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;}
  .item-hora{font-size:11px;font-weight:700;color:rgba(255,255,255,0.55);margin-top:2px;}
  .item-divider{width:1px;background:rgba(255,255,255,0.12);align-self:stretch;flex-shrink:0;}
  .item-info{flex:1;min-width:0;}
  .item-titulo{font-size:14px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-speaker{font-size:12px;font-weight:600;color:rgba(255,255,255,0.58);}
  .item-local{font-size:11px;color:rgba(255,255,255,0.32);margin-top:2px;}

  .loading{display:flex;align-items:center;justify-content:center;flex:1;color:rgba(255,255,255,0.4);font-size:14px;flex-direction:column;gap:10px;}
  .spinner{width:32px;height:32px;border:4px solid rgba(255,255,255,0.12);border-top-color:var(--laranja);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* COL DIREITA */
  .col-right{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 18px;gap:10px;border-left:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.14);}
  .qr-cta{font-size:11px;font-weight:800;color:var(--laranja);letter-spacing:1.2px;text-transform:uppercase;text-align:center;}
  .scan-ico{font-size:20px;animation:bounce .9s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .qr-frame{width:160px;height:160px;background:#fff;border-radius:14px;padding:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px var(--laranja),0 0 20px rgba(247,148,29,0.5);}
  .qr-frame img{width:144px;height:144px;display:block;border-radius:5px;}
  .qr-desc{font-size:13px;font-weight:800;color:#fff;text-align:center;line-height:1.35;}
  .qr-url{font-size:10px;color:rgba(255,255,255,0.40);text-align:center;word-break:break-all;line-height:1.3;}
  .qr-free{display:inline-flex;align-items:center;gap:5px;background:var(--laranja);border-radius:100px;padding:7px 16px;font-size:12px;font-weight:800;color:#fff;}
</style>
</head>

<!-- Firebase carregado de forma síncrona e sequencial -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
(function() {
  // Aguarda ambos os scripts do Firebase estarem prontos
  var firebaseConfig = {
    apiKey:            "AIzaSyBweUBoLxm6FuMp65aPUuExkuTVYp3rVKs",
    authDomain:        "anptech-summit-2026.firebaseapp.com",
    projectId:         "anptech-summit-2026",
    storageBucket:     "anptech-summit-2026.firebasestorage.app",
    messagingSenderId: "454031276319",
    appId:             "1:454031276319:web:2738fd5ca50c0a0fdc582a"
  };

  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    var db = firebase.firestore();

    function render(palestras) {
      var lista = palestras
        .filter(function(p) { return p.senac; })
        .sort(function(a, b) {
          if (a.dia !== b.dia) return (a.dia || 0) - (b.dia || 0);
          return (a.horario_inicio || '').localeCompare(b.horario_inicio || '');
        });

      var el = document.getElementById('list');

      if (!lista.length) {
        el.innerHTML = '<div class="loading"><div style="font-size:32px;">🎤</div>Nenhuma palestra cadastrada ainda</div>';
        return;
      }

      el.innerHTML = lista.map(function(p) {
        return '<div class="item">'
          + '<div class="item-day">'
          + '<div class="item-day-num">' + (p.dia || '?') + '</div>'
          + '<div class="item-day-mes">mai</div>'
          + '<div class="item-hora">' + (p.horario_inicio || '') + '</div>'
          + '</div>'
          + '<div class="item-divider"></div>'
          + '<div class="item-info">'
          + '<div class="item-titulo" title="' + (p.titulo || '') + '">' + (p.titulo || '—') + '</div>'
          + (p.palestrante ? '<div class="item-speaker">👤 ' + p.palestrante + '</div>' : '')
          + (p.local ? '<div class="item-local">📍 ' + p.local + '</div>' : '')
          + '</div></div>';
      }).join('');
    }

    db.collection('palestras').onSnapshot(
      function(snap) {
        render(snap.docs.map(function(d) {
          return Object.assign({id: d.id}, d.data());
        }));
      },
      function(err) {
        console.error('Firebase error:', err);
        document.getElementById('list').innerHTML =
          '<div class="loading"><div>⚠️</div>Sem conexão com o servidor</div>';
      }
    );

  } catch(e) {
    console.error('Erro ao inicializar Firebase:', e);
    document.getElementById('list').innerHTML =
      '<div class="loading"><div>⚠️</div>Erro ao carregar Firebase</div>';
  }
})();
</script>
