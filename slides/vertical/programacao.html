<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Programação — TV Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--laranja:#F7941D;--azul:#004587;--azul2:#002d6b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1920px;overflow:hidden;font-family:'Montserrat',sans-serif;background:#f3f4f6;}

  .topbar{height:14px;background:var(--azul);}
  .botbar{position:absolute;bottom:0;left:0;right:0;height:14px;background:var(--azul);}

  .header{background:var(--azul2);padding:56px 72px 48px;display:flex;align-items:flex-end;justify-content:space-between;}
  .header-left{}
  .logo{height:56px;object-fit:contain;margin-bottom:32px;display:block;}
  .logo-fb{width:130px;height:56px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:32px;}
  .logo-fb-t{font-size:28px;font-weight:900;color:#fff;}
  .logo-fb-sp{font-size:14px;font-weight:700;color:var(--laranja);align-self:flex-end;margin-bottom:4px;}
  .header-label{font-size:14px;font-weight:800;color:var(--laranja);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
  .header-title{font-size:48px;font-weight:900;color:#fff;line-height:1.1;}
  .header-right{text-align:right;}
  .day-badge{background:var(--laranja);border-radius:16px;padding:16px 28px;font-size:22px;font-weight:900;color:#fff;text-align:center;}
  .day-badge small{display:block;font-size:13px;font-weight:700;opacity:.85;}

  .list{padding:32px 64px 100px;overflow:hidden;height:calc(1920px - 14px - 200px - 14px);}

  .item{background:#fff;border-radius:20px;padding:36px 40px;margin-bottom:20px;border-left:8px solid var(--azul);display:flex;gap:28px;align-items:flex-start;}
  .item.atual{border-left-color:var(--laranja);background:#fff7ed;}
  .item.passado{opacity:.55;}

  .item-time{min-width:100px;text-align:center;}
  .item-ini{font-size:30px;font-weight:900;color:var(--azul);line-height:1;}
  .item-sep{font-size:14px;color:#aaa;margin:4px 0;}
  .item-fim{font-size:22px;font-weight:700;color:#999;}
  .item-info{flex:1;}
  .item-titulo{font-size:26px;font-weight:800;color:#1a1a1a;line-height:1.3;margin-bottom:8px;}
  .item-speaker{font-size:20px;font-weight:600;color:#555;}
  .item-dot{width:14px;height:14px;border-radius:50%;margin-top:6px;flex-shrink:0;}
  .dot-live{background:#f97316;box-shadow:0 0 0 4px rgba(249,115,22,.3);}
  .dot-ok{background:#22c55e;}
  .dot-fut{background:#d1d5db;}

  .live-badge{background:#f97316;color:#fff;font-size:13px;font-weight:800;border-radius:8px;padding:4px 12px;display:inline-block;margin-bottom:8px;letter-spacing:1px;}

  .loading{display:flex;align-items:center;justify-content:center;height:400px;font-size:22px;color:#999;}
  .spinner{width:48px;height:48px;border:5px solid #e5e7eb;border-top-color:var(--azul);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar"></div>

<div class="header">
  <div class="header-left">
    <img src="https://portal-bucket.azureedge.net/wp-content/sites/246/2024/01/senac-logo.png" alt="Senac" class="logo"
         onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex';">
    <div class="logo-fb" id="logo-fb" style="display:none;">
      <span class="logo-fb-t">SENAC</span><span class="logo-fb-sp">SP</span>
    </div>
    <div class="header-label">Stand Senac Araçatuba</div>
    <div class="header-title">Programação<br>do Dia</div>
  </div>
  <div class="header-right">
    <div class="day-badge" id="day-badge"><small>Hoje</small><span id="day-txt">—</span></div>
  </div>
</div>

<div class="list" id="list">
  <div class="loading"><div><div class="spinner"></div>Carregando programação…</div></div>
</div>

<div class="botbar"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:"AIzaSyBweUBoLxm6FuMp65aPUuExkuTVYp3rVKs",
  authDomain:"anptech-summit-2026.firebaseapp.com",
  projectId:"anptech-summit-2026",
  storageBucket:"anptech-summit-2026.firebasestorage.app",
  messagingSenderId:"454031276319",
  appId:"1:454031276319:web:2738fd5ca50c0a0fdc582a"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function tMin(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}

function render(palestras){
  const hoje = new Date().getDate(); // 15 ou 16
  const nm   = new Date().getHours()*60 + new Date().getMinutes();
  document.getElementById('day-txt').textContent = hoje + '/05';

  const dia = palestras.filter(p => p.senac && p.dia == hoje)
    .sort((a,b) => tMin(a.horario_inicio) - tMin(b.horario_inicio));

  if(!dia.length){
    document.getElementById('list').innerHTML = '<div class="loading" style="flex-direction:column;gap:16px;"><div style="font-size:40px;">📅</div><div>Sem programação para hoje</div></div>';
    return;
  }

  document.getElementById('list').innerHTML = dia.map(p => {
    const ini = tMin(p.horario_inicio||'');
    const fim = tMin(p.horario_fim||'');
    const ativo  = nm >= ini && nm < fim;
    const passado= p.horario_fim && nm >= fim;
    const dotCls = ativo ? 'dot-live' : passado ? 'dot-ok' : 'dot-fut';
    const cls    = ativo ? 'item atual' : passado ? 'item passado' : 'item';
    return `<div class="${cls}">
      <div class="item-time">
        <div class="item-ini">${p.horario_inicio||'?'}</div>
        ${p.horario_fim?`<div class="item-sep">|</div><div class="item-fim">${p.horario_fim}</div>`:''}
      </div>
      <div class="item-info">
        ${ativo?'<div class="live-badge">● AO VIVO</div>':''}
        <div class="item-titulo">${p.titulo||'—'}</div>
        ${p.palestrante?`<div class="item-speaker">👤 ${p.palestrante}</div>`:''}
      </div>
      <div class="item-dot ${dotCls}"></div>
    </div>`;
  }).join('');
}

db.collection('palestras').onSnapshot(snap => {
  render(snap.docs.map(d => ({id:d.id,...d.data()})));
});
setInterval(() => {
  db.collection('palestras').get().then(snap => render(snap.docs.map(d => ({id:d.id,...d.data()}))));
}, 60000);
</script>
</body>
</html>
