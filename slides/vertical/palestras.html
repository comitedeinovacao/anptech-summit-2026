<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Palestras — TV Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--laranja:#F7941D;--azul:#004587;--azul2:#002d6b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1920px;overflow:hidden;font-family:'Montserrat',sans-serif;background:var(--azul2);}

  .topbar{height:14px;background:var(--laranja);}
  .botbar{position:absolute;bottom:0;left:0;right:0;height:14px;background:var(--laranja);}

  /* HEADER */
  .header{padding:48px 72px 36px;display:flex;align-items:flex-start;justify-content:space-between;}
  .logo{height:52px;object-fit:contain;filter:brightness(0) invert(1);}
  .logo-fb{width:120px;height:52px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;gap:4px;}
  .logo-fb-t{font-size:26px;font-weight:900;color:#fff;}
  .logo-fb-sp{font-size:13px;font-weight:700;color:var(--laranja);align-self:flex-end;margin-bottom:3px;}
  .header-right{text-align:right;}
  .header-label{font-size:13px;font-weight:800;color:var(--laranja);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
  .header-title{font-size:40px;font-weight:900;color:#fff;line-height:1.15;}

  /* LISTA DE PALESTRAS */
  .list{padding:0 64px 24px;overflow:hidden;height:1100px;}

  .item{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:28px 32px;margin-bottom:14px;display:flex;gap:24px;align-items:flex-start;}
  .item-day{min-width:76px;text-align:center;padding-top:4px;}
  .item-day-num{font-size:34px;font-weight:900;color:var(--laranja);line-height:1;}
  .item-day-mes{font-size:13px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;}
  .item-hora{font-size:16px;font-weight:700;color:rgba(255,255,255,.6);margin-top:3px;}
  .item-info{flex:1;}
  .item-titulo{font-size:22px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:8px;}
  .item-speaker{font-size:17px;font-weight:600;color:rgba(255,255,255,.65);margin-bottom:4px;}
  .item-local{font-size:14px;color:rgba(255,255,255,.35);}

  /* QR CODE */
  .qr-section{margin:0 64px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:36px 40px;display:flex;gap:40px;align-items:center;}
  .qr-img{width:220px;height:220px;background:#fff;border-radius:16px;padding:12px;flex-shrink:0;}
  .qr-img img{width:196px;height:196px;display:block;border-radius:6px;}
  .qr-info{}
  .qr-label{font-size:13px;font-weight:800;color:var(--laranja);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
  .qr-text{font-size:26px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:12px;}
  .qr-url{font-size:16px;color:rgba(255,255,255,.55);line-height:1.5;word-break:break-all;}
  .qr-free{background:var(--laranja);border-radius:100px;padding:8px 24px;display:inline-block;font-size:15px;font-weight:800;color:#fff;margin-top:12px;}

  .loading{display:flex;align-items:center;justify-content:center;height:600px;color:rgba(255,255,255,.5);font-size:22px;flex-direction:column;gap:16px;}
  .spinner{width:48px;height:48px;border:5px solid rgba(255,255,255,.15);border-top-color:var(--laranja);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar"></div>

<div class="header">
  <div>
    <img src="https://portal-bucket.azureedge.net/wp-content/sites/246/2024/01/senac-logo.png" alt="Senac" class="logo"
         onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex';">
    <div class="logo-fb" id="logo-fb" style="display:none;">
      <span class="logo-fb-t">SENAC</span><span class="logo-fb-sp">SP</span>
    </div>
  </div>
  <div class="header-right">
    <div class="header-label">Stand Senac</div>
    <div class="header-title">Nossas<br>Palestras</div>
  </div>
</div>

<div class="list" id="list">
  <div class="loading"><div class="spinner"></div>Carregando palestras…</div>
</div>

<!-- QR CODE DE INSCRIÇÃO -->
<div class="qr-section">
  <div class="qr-img">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=196x196&color=004587&data=https%3A%2F%2Fcomitedeinovacao.github.io%2Fanptech-summit-2026%2Finscrever.html"
         alt="QR Inscrição">
  </div>
  <div class="qr-info">
    <div class="qr-label">Inscreva-se</div>
    <div class="qr-text">Garanta sua vaga gratuitamente!</div>
    <div class="qr-url">comitedeinovacao.github.io/<br>anptech-summit-2026/inscrever.html</div>
    <div class="qr-free">✅ Gratuito &amp; Sem Cadastro</div>
  </div>
</div>

<div class="botbar"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:"AIzaSyBweUBoLxm6FuMp65aPUuExkuTVYp3rVKs",
  authDomain:"anptech-summit-2026.firebaseapp.com",
  projectId:"anptech-summit-2026",
  storageBucket:"anptech-summit-2026.firebasestorage.app",
  messagingSenderId:"454031276319",
  appId:"1:454031276319:web:2738fd5ca50c0a0fdc582a"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function render(palestras){
  const lista = palestras
    .filter(p => p.senac)
    .sort((a,b) => {
      if(a.dia !== b.dia) return (a.dia||0)-(b.dia||0);
      return (a.horario_inicio||'').localeCompare(b.horario_inicio||'');
    });

  if(!lista.length){
    document.getElementById('list').innerHTML = '<div class="loading"><div style="font-size:40px;">🎤</div>Nenhuma palestra cadastrada</div>';
    return;
  }

  document.getElementById('list').innerHTML = lista.map(p => `
    <div class="item">
      <div class="item-day">
        <div class="item-day-num">${p.dia||'?'}</div>
        <div class="item-day-mes">maio</div>
        <div class="item-hora">${p.horario_inicio||'?'}</div>
      </div>
      <div class="item-info">
        <div class="item-titulo">${p.titulo||'—'}</div>
        ${p.palestrante?`<div class="item-speaker">👤 ${p.palestrante}</div>`:''}
        ${p.local?`<div class="item-local">📍 ${p.local}</div>`:''}
      </div>
    </div>`).join('');
}

db.collection('palestras').onSnapshot(snap => {
  render(snap.docs.map(d => ({id:d.id,...d.data()})));
}, () => {
  document.getElementById('list').innerHTML = '<div class="loading"><div>⚠️</div>Sem conexão com Firebase</div>';
});
</script>
</body>
</html>
